    <h2>Get in Touch</h2>

    <form id="contact-form">
        <input type="text" id="name" placeholder="Your Name" required><br><br>
        <input type="email" id="email" placeholder="Your Email" required><br><br>
        
        <select id="interest" required>
            <option value="">What do you want to learn?</option>
            <option value="growth">Social Media Growth</option>
            <option value="branding">Personal Branding</option>
            <option value="brands">Working with Brands</option>
        </select><br><br>

        <button type="submit">Submit</button>
    </form>

    <p id="form-message"></p>
</main>
