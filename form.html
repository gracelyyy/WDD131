<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Product review form for Laid With Grace where users can submit feedback on hair products.">
  <meta name="author" content="Mosa Molapo">
  <title>Laid With Grace | Product Review</title>

  <link rel="stylesheet" href="styles/styles.css">
  <script defer src="scripts/script.js"></script>
</head>

<body>

<header>
  <h1>Laid With Grace</h1>
</header>

<main class="container">

  <h2>Product Review</h2>

<form method="get" action="review.html">

  <label for="product">Product Name</label>
  <select id="product" name="product" required>
    <option value="" disabled selected>Select a Product ...</option>
  </select>

  <fieldset>
    <legend>Overall Rating</legend>

    <input type="radio" id="rating1" name="rating" value="1" required>
    <label for="rating1">1 Star</label>

    <input type="radio" id="rating2" name="rating" value="2">
    <label for="rating2">2 Stars</label>

    <input type="radio" id="rating3" name="rating" value="3">
    <label for="rating3">3 Stars</label>

    <input type="radio" id="rating4" name="rating" value="4">
    <label for="rating4">4 Stars</label>

    <input type="radio" id="rating5" name="rating" value="5">
    <label for="rating5">5 Stars</label>

  </fieldset>

  <label for="date">Date of Installation</label>
  <input type="date" id="date" name="date" required>

  <fieldset>
    <legend>Useful Features</legend>

    <input type="checkbox" id="feature1" name="features" value="durable">
    <label for="feature1">Durable</label>

    <input type="checkbox" id="feature2" name="features" value="easy">
    <label for="feature2">Easy to Use</label>

    <input type="checkbox" id="feature3" name="features" value="design">
    <label for="feature3">Stylish Design</label>

    <input type="checkbox" id="feature4" name="features" value="affordable">
    <label for="feature4">Affordable</label>

  </fieldset>

  <label for="review">Written Review</label>
  <textarea id="review" name="review" required></textarea>

  <label for="username">Your Name</label>
  <input type="text" id="username" name="username" required>

  <input type="submit" value="Submit Review" class="btn">

</form>

</main>

<footer>
  <p>&copy; 2026 | Mosa Molapo | Laid With Grace</p>
</footer>

</body>
</html>
