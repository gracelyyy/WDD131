<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Product review form for Laid With Grace where users can submit feedback on hair products.">
  <meta name="author" content="Mosa Molapo">

  <title>Laid With Grace | Product Review</title>

  <link rel="stylesheet" href="styles/styles.css">
  <script defer src="scripts/script.js"></script>
</head>

<body>

<header>
  <h1>Laid With Grace</h1>
</header>

<main class="container">

  <h2>Product Review</h2>

  <form method="get" action="review.html">

    <!-- PRODUCT SELECT -->
    <label for="product">Product Name</label>
    <select id="product" name="product" required>
      <option value="" disabled selected>Select a Product...</option>
      <option value="shampoo">Shampoo</option>
      <option value="conditioner">Conditioner</option>
      <option value="oil">Hair Oil</option>
      <option value="cream">Hair Cream</option>
    </select>

    <!-- RATING -->
   <fieldset>
  <legend>Overall Rating</legend>

  <label>
    <input type="radio" id="rating1" name="rating" value="1" required>
    1 Star
  </label>

  <label>
    <input type="radio" id="rating2" name="rating" value="2" required>
    2 Stars
  </label>

  <label>
    <input type="radio" id="rating3" name="rating" value="3" required>
    3 Stars
  </label>

  <label>
    <input type="radio" id="rating4" name="rating" value="4" required>
    4 Stars
  </label>

  <label>
    <input type="radio" id="rating5" name="rating" value="5" required>
    5 Stars
  </label>

</fieldset>

    <!-- DATE -->
    <label for="date">Date of Installation</label>
    <input type="date" id="date" name="date" required>

    <!-- FEATURES -->
    <fieldset>
      <legend>Useful Features</legend>

      <label>
        <input type="checkbox" id="feature1" name="features" value="durable">
        Durable
      </label>

      <label>
        <input type="checkbox" id="feature2" name="features" value="easy">
        Easy to Use
      </label>

      <label>
        <input type="checkbox" id="feature3" name="features" value="design">
        Stylish Design
      </label>

      <label>
        <input type="checkbox" id="feature4" name="features" value="affordable">
        Affordable
      </label>

    </fieldset>

    <!-- REVIEW -->
    <label for="review">Written Review</label>
    <textarea id="review" name="review" required></textarea>

    <!-- NAME -->
    <label for="username">Your Name</label>
    <input type="text" id="username" name="username" required>

    <!-- SUBMIT -->
    <input type="submit" value="Submit Review" class="btn">

  </form>

</main>

<footer>
  <p>&copy; 2026 | Mosa Molapo | Laid With Grace</p>
</footer>

</body>
</html>
