<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filtered Temples</title>
    <link rel="stylesheet" href="filtered-temples.css">
    <script src="filtered-temples.js" defer></script>
</head>
<body>

<header>
    <h1>Temple Album</h1>
    <nav>
        <button onclick="filterTemples('all')">Home</button>

</header>

<main id="temple-container"></main>

<footer>

</footer>

</html>
